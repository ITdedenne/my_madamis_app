# === ユーザー関連 ===

# "users" テーブル
# ルール: 自分のUserデータは自分で作成・更新・閲覧できる (Cognito)
#        ログイン済みユーザーは他人のUserデータ（プロフィール）を閲覧できる (Cognito)
type User @model 
  @auth(rules: [
    { allow: owner, operations: [read, update, create] },
    { allow: private, operations: [read] } 
  ]) {
  id: ID! @primaryKey # Cognitoのsub(userId)
  username: String!
  bio: String


  # ユーザー検索用のID (7桁の数字を想定)
  # GSI (Global Secondary Index) を作成し、検索クエリ 'userByFriendID' を自動生成
  friendID: String! @index(name: "byFriendID", queryField: "userByFriendID")
  

  scenarios: [UserScenario] @hasMany(indexName: "byUser", fields: ["id"])
  following: [UserRelationship] @hasMany(indexName: "byFollowing", fields: ["id"])
}

# "user_relationships" テーブル
# ルール: 自分のフォロー関係は自分で作成・削除・閲覧できる (Cognito)
type UserRelationship @model 
  @auth(rules: [
    { allow: owner, ownerField: "followingId", operations: [create, delete, read] }
  ]) {
  id: ID!
  followingId: ID! @index(name: "byFollowing", sortKeyFields: ["followedId"]) # PK: フォローした人
  followedId: ID! # SK: フォローされた人

  followedUser: User @belongsTo(fields: ["followedId"])
  followerUser: User @belongsTo(fields: ["followingId"])
}

# === シナリオ関連 ===

# "scenarios" テーブル
# ルール: ログイン済みユーザー(Cognito)も、してない人(API Key)もシナリオを閲覧できる
type Scenario @model 
  @auth(rules: [
    { allow: private, operations: [read] }, # Cognito
    { allow: public, provider: apiKey, operations: [read] } # API Key
  ]) {
  id: ID! @primaryKey # CSVのscenarioId
  title: String!
  minPlayerCount: Int
  maxPlayerCount: Int
  gmRequirement: String
  authorId: ID! @index(name: "byAuthor", sortKeyFields: ["title"])
  storeUrl: String

  author: Author @belongsTo(fields: ["authorId"])
  users: [UserScenario] @hasMany(indexName: "byScenario", fields: ["id"])
}

# "authors" テーブル
# ルール: ログイン済みユーザー(Cognito)も、してない人(API Key)も作者を閲覧できる
type Author @model 
  @auth(rules: [
    { allow: private, operations: [read] }, # Cognito
    { allow: public, provider: apiKey, operations: [read] } # API Key
  ]) {
  id: ID! @primaryKey # CSVのauthorId
  authorName: String!

  scenarios: [Scenario] @hasMany(indexName: "byAuthor", fields: ["id"])
}

# === 中間テーブル ===

# "user_scenarios" テーブル
# ルール: 自分の手帳は自分で全操作できる (Cognito)
#        ログイン済みユーザーは他人の手帳を（プロフィール拡張機能のため）閲覧できる (Cognito)
type UserScenario @model 
  @auth(rules: [
    { allow: owner, ownerField: "userId" }, # CRUD (create, read, update, delete)
    { allow: private, operations: [read] }
  ]) {
  id: ID!
  userId: ID! @index(name: "byUser", sortKeyFields: ["scenarioId"]) # PK: userId (マイリスト表示用)
  scenarioId: ID! @index(name: "byScenario", sortKeyFields: ["userId"]) # GSI: scenarioId (プレイヤーファインダー用)
  status: String! # "passed" または "owned"

  user: User @belongsTo(fields: ["userId"])
  scenario: Scenario @belongsTo(fields: ["scenarioId"])
}